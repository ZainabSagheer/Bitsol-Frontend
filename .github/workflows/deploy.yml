name: Build Check

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js app
        run: node node_modules/next/dist/bin/next build
        env:
          DATABASE_URL: "mongodb+srv://placeholder:placeholder@placeholder.mongodb.net/bitsol"
          BLOG_API_KEY: ${{ secrets.BLOG_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_SITE_URL: https://bitsolmarketing.com
          NEXT_PUBLIC_API_URL: https://admin.bitsolmarketing.com
