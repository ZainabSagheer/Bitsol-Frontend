name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: node node_modules/next/dist/bin/next build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BLOG_API_KEY: ${{ secrets.BLOG_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_SITE_URL: https://bitsolmarketing.com
          NEXT_PUBLIC_API_URL: https://admin.bitsolmarketing.com

      - name: Prepare standalone bundle
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Write .env to standalone
        run: |
          cat > .next/standalone/.env << 'EOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          BLOG_API_KEY=${{ secrets.BLOG_API_KEY }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_SITE_URL=https://bitsolmarketing.com
          NEXT_PUBLIC_API_URL=https://admin.bitsolmarketing.com
          EOF

      - name: Deploy to Hostinger via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          source: ".next/standalone/."
          target: ${{ secrets.HOSTINGER_APP_PATH }}
          rm: true

      - name: Restart Node.js app on Hostinger
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          script: |
            cd ${{ secrets.HOSTINGER_APP_PATH }}
            node --version
            echo "Deploy complete — app files updated"
